name: chrisvouga

networks:
  web:
    name: chrisvouga-web

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - web

  portfolio:
    image: ghcr.io/crvouga/chrisvouga-portfolio:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.portfolio.rule=Host(`www.chrisvouga.dev`)
      - traefik.http.routers.portfolio.entrypoints=web
      - traefik.http.services.portfolio.loadbalancer.server.port=80

  pickflix:
    image: ghcr.io/crvouga/chrisvouga-pickflix:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - web
    env_file:
