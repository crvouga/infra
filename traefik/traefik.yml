# HTTP-only origin — Cloudflare terminates TLS at the edge (proxied DNS).
api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    # Cloudflare Flexible terminates TLS; preserve CF X-Forwarded-Proto for apps (e.g. pickflix ensureHttps).
    forwardedHeaders:
      insecure: true

providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    network: chrisvouga-web
