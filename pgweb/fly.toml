app = "crvouga-pgweb"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  # pgweb enables HTTP basic auth — GET / returns 401 and fails Fly HTTP checks.
