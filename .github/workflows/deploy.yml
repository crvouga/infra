name: Migrate DB

# Run Postgres schema migrations for OpenBao storage.
# Image build/push and deploy are handled by publish-image.yml + chrisvouga.dev.

on:
  push:
    branches:
      - main
    paths:
      - scripts/migrate.sh
      - scripts/lib/**
  workflow_dispatch:

concurrency:
  group: migrate-db-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-db:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Run migrations
        env:
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          chmod +x scripts/migrate.sh
          ./scripts/migrate.sh
