name: Fly deploy

# Deploys vault standalone: Fly deploy -> DNS reconcile -> unseal -> smoke test.
# Runs after publish-image.yml pushes a new image to ghcr.io.

on:
  workflow_run:
    workflows: [Publish image]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  VAULT_ADDR: https://vault.chrisvouga.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v5

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: flyctl secrets set DB_CONNECTION_URI="${DB_CONNECTION_URI}" --config fly.toml

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config fly.toml --wait-timeout 15m

      - name: Ensure cert
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl certs add vault.chrisvouga.dev --config fly.toml || true
          flyctl certs check vault.chrisvouga.dev --config fly.toml

      - name: Reconcile DNS
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          chmod +x scripts/sync-dns.sh
          ./scripts/sync-dns.sh

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release jq
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Unseal OpenBao
        env:
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          chmod +x scripts/install-vault-cli.sh scripts/repair-openbao-auth-mounts.sh scripts/unseal.sh
          ./scripts/install-vault-cli.sh
          ./scripts/repair-openbao-auth-mounts.sh
          ./scripts/unseal.sh

      - name: Smoke test
        env:
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          export VAULT_TOKEN="$(./scripts/fetch-vault-token.sh)"
          ./scripts/smoke-test.sh
