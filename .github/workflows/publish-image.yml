name: Publish image

# Build and push the OpenBao image to ghcr.io. fly-deploy.yml runs on
# completion of this workflow to deploy the new image.

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - docker-entrypoint.sh
      - config/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/crvouga/chrisvouga-vault:latest
            ghcr.io/crvouga/chrisvouga-vault:${{ github.sha }}

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for URL in \
            "https://api.github.com/user/packages/container/chrisvouga-vault/visibility" \
            "https://api.github.com/orgs/crvouga/packages/container/chrisvouga-vault/visibility"
          do
            STATUS=$(curl -s -o /tmp/ghcr-vis-body.txt -w "%{http_code}" \
              -X PATCH \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              -d '{"visibility":"public"}' \
              "${URL}")
            if [ "${STATUS}" -ge 200 ] && [ "${STATUS}" -lt 300 ]; then
              echo "Package chrisvouga-vault is public (${URL})"
              exit 0
            fi
            if [ "${STATUS}" != "404" ]; then
              echo "Warning: could not set chrisvouga-vault public via ${URL} (HTTP ${STATUS})"
              cat /tmp/ghcr-vis-body.txt || true
            fi
          done
          echo "Package chrisvouga-vault visibility not updated (may not exist yet on first push)"
