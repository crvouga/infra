# Reusable workflow — call from each project repo to build, push, and notify deploy.
#
# Example caller (.github/workflows/publish-image.yml):
#
#   on:
#     push:
#       branches: [main]
#   jobs:
#     publish:
#       uses: crvouga/chrisvouga.dev/.github/workflows/reusable-publish-image.yml@main
#       permissions:
#         contents: read
#         packages: write
#       with:
#         service_id: pickflix
#         dockerfile: ./Dockerfile
#         context: .
#         image_prefix: chrisvouga-dev
#         infra_github_repo: crvouga/chrisvouga.dev

name: Reusable publish image

on:
  workflow_call:
    inputs:
      service_id:
        description: "Service id matching services.yaml (e.g. pickflix, portfolio)."
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile relative to context."
        required: false
        type: string
        default: ./Dockerfile
      context:
        description: "Docker build context."
        required: false
        type: string
        default: .
      image_owner:
        description: "ghcr.io owner."
        required: false
        type: string
        default: crvouga
      image_prefix:
        description: "GHCR package prefix (zone slug, e.g. chrisvouga-dev)."
        required: true
        type: string
      infra_github_repo:
        description: "Infra repo owner/name for deploy dispatch."
        required: true
        type: string
    secrets:
      DEPLOY_DISPATCH_TOKEN:
        description: "PAT or GITHUB_TOKEN with repo dispatch to the infra repo."
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-push-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4.0.0

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ inputs.image_owner }}/${{ inputs.image_prefix }}-${{ inputs.service_id }}:latest
            ghcr.io/${{ inputs.image_owner }}/${{ inputs.image_prefix }}-${{ inputs.service_id }}:${{ github.sha }}

      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PKG: ${{ inputs.image_prefix }}-${{ inputs.service_id }}
        run: |
          set -euo pipefail
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d '{"visibility":"public"}' \
            "https://api.github.com/user/packages/container/${PKG}/visibility")
          if [ "${STATUS}" = "404" ]; then
            echo "Package not found yet (first push) — visibility can be set on next run"
          elif [ "${STATUS}" -ge 200 ] && [ "${STATUS}" -lt 300 ]; then
            echo "Package ${PKG} is public"
          else
            echo "Warning: could not set ${PKG} public (HTTP ${STATUS})"
          fi

      - name: Notify infra deploy
        env:
          DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
          INFRA_REPO: ${{ inputs.infra_github_repo }}
        run: |
          set -euo pipefail
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "ERROR: DEPLOY_DISPATCH_TOKEN is not set on this repo" >&2
            echo "Run: GITHUB_TOKEN_SUPER=... bun run rollout-publish -- --repo ${{ github.repository }} --set-org-dispatch-secret" >&2
            exit 1
          fi
          HTTP=$(curl -sS -o /tmp/dispatch-body.txt -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${INFRA_REPO}/dispatches" \
            -d "{\"event_type\":\"deploy-service\",\"client_payload\":{\"id\":\"${{ inputs.service_id }}\",\"image_tag\":\"${{ github.sha }}\"}}")
          if [ "${HTTP}" -ge 200 ] && [ "${HTTP}" -lt 300 ]; then
            echo "Dispatched deploy-service for ${{ inputs.service_id }}@${{ github.sha }}"
            exit 0
          fi
          echo "Deploy dispatch failed (HTTP ${HTTP}):" >&2
          cat /tmp/dispatch-body.txt >&2
          if [ "${HTTP}" = "403" ]; then
            echo "Set DEPLOY_DISPATCH_TOKEN on this repo (GITHUB_TOKEN_SUPER PAT with repo scope)." >&2
          fi
          exit 1
