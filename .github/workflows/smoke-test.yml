name: Smoke Test

on:
  workflow_dispatch:

env:
  CUSTOM_DOMAIN: secret-store.chrisvouga.dev

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run smoke test
        env:
          VAULT_ADDR: https://${{ env.CUSTOM_DOMAIN }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${VAULT_TOKEN}" ]; then
            echo "VAULT_TOKEN not configured — skipping smoke test (add after running init.sh)"
            exit 0
          fi

          chmod +x scripts/install-vault-cli.sh scripts/smoke-test.sh
          ./scripts/install-vault-cli.sh
          ./scripts/smoke-test.sh
