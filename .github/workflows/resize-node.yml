name: Resize node

on:
  workflow_dispatch:
    inputs:
      size:
        description: "Target droplet size slug"
        required: false
        type: string
        default: s-2vcpu-4gb
      trigger_deploy:
        description: "Run deploy-pipeline after resize"
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  resize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - name: Install gh CLI
        run: |
          type -p curl >/dev/null || sudo apt install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
      - name: Resize DigitalOcean droplet
        env:
          GITHUB_TOKEN_SUPER: ${{ env.GITHUB_TOKEN_SUPER }}
          DIGITALOCEAN_TOKEN: ${{ env.DIGITALOCEAN_TOKEN }}
          VAULT_ADDR: ${{ env.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          set -euo pipefail
          ARGS=(--size "${{ inputs.size }}")
          if [ "${{ inputs.trigger_deploy }}" != "true" ]; then
            ARGS+=(--no-deploy)
          fi
          bun run scripts/resize-droplet.ts "${ARGS[@]}"
