name: Resize node

on:
  workflow_dispatch:
    inputs:
      size:
        description: "Basic Droplet size (nyc3). Monthly price is DO's capped rate; billed per-second with 60s minimum."
        required: true
        type: choice
        default: "s-2vcpu-4gb — $24/mo (2 vCPU · 4 GiB · 80 GiB SSD)"
        options:
          - "s-1vcpu-512mb-10gb — $4/mo (1 vCPU · 512 MiB · 10 GiB SSD)"
          - "s-1vcpu-1gb — $6/mo (1 vCPU · 1 GiB · 25 GiB SSD)"
          - "s-1vcpu-2gb — $12/mo (1 vCPU · 2 GiB · 50 GiB SSD)"
          - "s-2vcpu-2gb — $18/mo (2 vCPU · 2 GiB · 60 GiB SSD)"
          - "s-2vcpu-4gb — $24/mo (2 vCPU · 4 GiB · 80 GiB SSD)"
          - "s-4vcpu-8gb — $48/mo (4 vCPU · 8 GiB · 160 GiB SSD)"
          - "s-8vcpu-16gb — $96/mo (8 vCPU · 16 GiB · 320 GiB SSD)"
      trigger_deploy:
        description: "Run deploy-pipeline after resize"
        required: false
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

# Fallback when Vault OIDC is unavailable — same as deploy-pipeline.
env:
  DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
  GITHUB_TOKEN_SUPER: ${{ secrets.GITHUB_TOKEN_SUPER }}
  NODE_SSH_HOST: ${{ secrets.NODE_SSH_HOST }}
  NODE_SSH_USER: ${{ secrets.NODE_SSH_USER }}
  NODE_SSH_KEY: ${{ secrets.NODE_SSH_KEY }}

jobs:
  resize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - name: Install gh CLI
        run: |
          type -p curl >/dev/null || sudo apt install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
      - name: Resize DigitalOcean droplet
        env:
          SIZE_INPUT: ${{ inputs.size }}
          GITHUB_TOKEN_SUPER: ${{ env.GITHUB_TOKEN_SUPER }}
          DIGITALOCEAN_TOKEN: ${{ env.DIGITALOCEAN_TOKEN }}
          VAULT_ADDR: ${{ env.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          set -euo pipefail
          # Slug is the first token (labels include "$24/mo" — must not expand in bash)
          SIZE="$(printf '%s' "$SIZE_INPUT" | awk '{print $1}')"
          echo "Target size slug: ${SIZE}"
          ARGS=(--size "${SIZE}")
          if [ "${{ inputs.trigger_deploy }}" != "true" ]; then
            ARGS+=(--no-deploy)
          fi
          bun run scripts/resize-droplet.ts "${ARGS[@]}"
