name: Deploy fleet

# Railway stack — fully automated via GitHub Actions.
#
#   prepare | vault-ready → dns-sync | make-ghcr-public | railway-deploy (matrix)
#                         → health-check-all
#
# Secrets: Vault OIDC via .github/actions/vault-secrets (not GitHub repo secrets).
#
# Triggers:
#   - push to main (checks, DNS, GHCR — no fleet redeploy)
#   - repository_dispatch (deploy-service)
#   - workflow_dispatch
#   - workflow_run after Deploy vault succeeds (reconcile DNS/GHCR once vault is unsealed)

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - ".cursor/**"
      - "vault/**"
      - "turborepo/**"
  repository_dispatch:
    types:
      - deploy-service
  workflow_dispatch:
    inputs:
      service_id:
        description: "Single service id (empty = all services)."
        required: false
        type: string
      image_tag:
        description: "Image tag to deploy. Defaults to latest."
        required: false
        type: string
        default: latest
      apply_dns:
        description: "Apply Cloudflare DNS changes."
        required: false
        type: boolean
        default: true
  workflow_run:
    workflows: ["Deploy vault"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-fleet-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  packages: write

env:
  SERVICE_ID: ${{ github.event.client_payload.id || inputs.service_id || '' }}
  IMAGE_TAG: ${{ github.event.client_payload.image_tag || inputs.image_tag || 'latest' }}
  VAULT_ADDR: https://vault.chrisvouga.dev

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      service_id: ${{ steps.resolve.outputs.service_id }}
      service_ids: ${{ steps.resolve.outputs.service_ids }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run provision-railway --check --fleet-only
      - id: resolve
        run: |
          set -euo pipefail
          SID="${SERVICE_ID}"
          TAG="${IMAGE_TAG}"
          if [ -n "${SID}" ]; then
            SERVICE_IDS="$(bun run scripts/list-deploy-service-ids.ts --id "${SID}")"
          else
            SERVICE_IDS="$(bun run scripts/list-deploy-service-ids.ts)"
          fi
          echo "service_id=${SID}" >> "$GITHUB_OUTPUT"
          echo "service_ids=${SERVICE_IDS}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Deploy: service_id='${SID:-all}' services=${SERVICE_IDS} image_tag='${TAG}'"

  vault-ready:
    runs-on: ubuntu-latest
    steps:
      - name: Require successful Deploy vault for workflow_run
        if: github.event_name == 'workflow_run'
        run: |
          set -euo pipefail
          conclusion="${{ github.event.workflow_run.conclusion }}"
          if [ "$conclusion" != "success" ]; then
            echo "::error::Skipping Deploy fleet: Deploy vault concluded with '${conclusion}' (need success + unseal)"
            exit 1
          fi
          echo "Deploy vault succeeded — waiting for Vault to be ready"

      - name: Wait for Vault to be unsealed
        run: |
          set -euo pipefail
          addr="${VAULT_ADDR}"
          echo "Waiting for Vault at ${addr}..."
          for i in $(seq 1 180); do
            code="$(curl -s -o /dev/null -w '%{http_code}' \
              "${addr}/v1/sys/health?standbyok=true&perfstandbyok=true" || true)"
            case "$code" in
              200|429|472|473)
                echo "Vault is unsealed (HTTP ${code})"
                exit 0
                ;;
              503)
                echo "Vault sealed — retry ${i}/180..."
                ;;
              *)
                echo "Vault not ready (HTTP ${code:-000}) — retry ${i}/180..."
                ;;
            esac
            sleep 5
          done
          echo "::error::Vault at ${addr} did not become unsealed within 15 minutes"
          exit 1

  make-ghcr-public:
    runs-on: ubuntu-latest
    needs: [prepare, vault-ready]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - run: bun run make-ghcr-public
        env:
          GH_TOKEN: ${{ github.token }}

  dns-sync:
    runs-on: ubuntu-latest
    needs: [prepare, vault-ready]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - name: Reconcile DNS
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_TOKEN }}
          CF_APPLY: ${{ github.event_name == 'push' || github.event_name == 'workflow_run' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          if [ "${CF_APPLY}" = "true" ] && { [ "${{ github.event_name }}" = "repository_dispatch" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; }; then
            ARGS+=(--wait-for-certs)
          fi
          bun run sync-dns "${ARGS[@]}"
      - name: Ensure apex redirect
        env:
          CF_APPLY: ${{ github.event_name == 'push' || github.event_name == 'workflow_run' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          bun run sync-redirects "${ARGS[@]}"
      - name: Ensure domain aliases
        env:
          CF_APPLY: ${{ github.event_name == 'push' || github.event_name == 'workflow_run' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          bun run sync-aliases "${ARGS[@]}"

  railway-deploy:
    if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [prepare, vault-ready]
    strategy:
      fail-fast: false
      matrix:
        service_id: ${{ fromJson(needs.prepare.outputs.service_ids) }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - name: Sync Railway secrets
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::warning::RAILWAY_TOKEN not set — skipping sync-railway-secrets"
            exit 0
          fi
          bun run sync-railway-secrets --id "${{ matrix.service_id }}"
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ env.RAILWAY_TOKEN }}
          GH_TOKEN: ${{ env.GITHUB_TOKEN_SUPER || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "ERROR: RAILWAY_TOKEN is required" >&2
            exit 1
          fi
          bun run deploy-railway \
            --id "${{ matrix.service_id }}" \
            --image-tag "${{ needs.prepare.outputs.image_tag }}"

      - name: Health-check service
        if: success()
        run: bun run health-check --id "${{ matrix.service_id }}"

  health-check-all:
    runs-on: ubuntu-latest
    needs: [prepare, vault-ready, railway-deploy]
    if: always() && needs.prepare.result == 'success' && needs.vault-ready.result == 'success' && (needs.railway-deploy.result == 'success' || needs.railway-deploy.result == 'skipped')
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - name: Health-check all public services
        run: bun run health-check --all-public
