name: Destroy DigitalOcean

# One-time manual workflow — run after Fly.io cutover is healthy.
# Irreversible: deletes the origin droplet and purges NODE_SSH_* from Vault.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy-origin" to delete the DO droplet permanently'
        required: true
        type: string
      droplet_name:
        description: Droplet name to delete
        required: false
        type: string
        default: origin
      project_name:
        description: DigitalOcean project name
        required: false
        type: string
        default: projects

permissions:
  id-token: write
  contents: read

env:
  DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
  FLY_TOKEN: ${{ secrets.FLY_TOKEN }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm destruction
        run: |
          if [ "${{ inputs.confirm }}" != "destroy-origin" ]; then
            echo "Confirmation failed — type exactly: destroy-origin"
            exit 1
          fi

      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}

      - name: Load DIGITALOCEAN_TOKEN from Vault if missing
        if: env.DIGITALOCEAN_TOKEN == ''
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: jwt
          path: jwt
          role: github-actions
          jwtGithubAudience: ${{ env.VAULT_ADDR }}
          secrets: |
            secret/data/personal/prd DIGITALOCEAN_TOKEN | DIGITALOCEAN_TOKEN

      - name: Destroy DO droplet
        env:
          DROPLET_NAME: ${{ inputs.droplet_name }}
          PROJECT_NAME: ${{ inputs.project_name }}
        run: |
          set -euo pipefail
          if [ -z "${DIGITALOCEAN_TOKEN:-}" ]; then
            echo "ERROR: DIGITALOCEAN_TOKEN is required" >&2
            exit 1
          fi
          bun run scripts/destroy-digitalocean.ts \
            --name "${DROPLET_NAME}" \
            --project "${PROJECT_NAME}" \
            --apply

      - name: Prune origin DNS record
        run: bun run sync-dns --apply
