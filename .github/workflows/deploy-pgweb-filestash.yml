name: Deploy pgweb and Filestash

# Fully automated: Vault bootstrap → Fly idempotent setup → deploy.
# Prerequisites (one-time, org-wide): FLY_TOKEN + Vault OIDC in deploy-pipeline.

on:
  push:
    branches:
      - main
    paths:
      - "pgweb/**"
      - "filestash/**"
      - "lib/admin-fly-apps.ts"
      - "scripts/setup-pgweb-filestash.ts"
      - "scripts/deploy-pgweb-filestash.ts"
      - ".github/workflows/deploy-pgweb-filestash.yml"
  workflow_dispatch:

concurrency:
  group: deploy-pgweb-filestash-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy-pgweb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"

      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Idempotent setup (pgweb)
        env:
          FLY_API_TOKEN: ${{ env.FLY_TOKEN }}
        run: bun run setup-pgweb-filestash --app pgweb

      - name: Deploy pgweb
        run: bun run deploy-pgweb-filestash --app pgweb

  deploy-filestash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"

      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Idempotent setup (filestash)
        env:
          FLY_API_TOKEN: ${{ env.FLY_TOKEN }}
        run: bun run setup-pgweb-filestash --app filestash

      - name: Deploy filestash
        run: bun run deploy-pgweb-filestash --app filestash
