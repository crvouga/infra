name: Vault deploy

# Full pipeline on push to main: migrate -> build -> Railway deploy -> DNS -> unseal -> smoke -> health.
# workflow_dispatch with unseal_only skips migrate/build/deploy; still reconciles DNS and verifies the domain.

on:
  push:
    branches:
      - main
    paths:
      - vault/**
  workflow_dispatch:
    inputs:
      unseal_only:
        description: Skip migrate/build/deploy; still reconcile DNS and verify vault.chrisvouga.dev
        type: boolean
        default: false

concurrency:
  group: vault-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  VAULT_ADDR: https://vault.chrisvouga.dev
  VAULT_HOSTNAME: vault.chrisvouga.dev

defaults:
  run:
    working-directory: vault

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      DEPLOY_DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: .

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release jq dnsutils
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
        working-directory: .

      - name: Run migrations
        if: github.event_name == 'push' || inputs.unseal_only != true
        run: |
          set -euo pipefail
          chmod +x scripts/migrate.sh
          ./scripts/migrate.sh

      - uses: docker/setup-buildx-action@v4.0.0
        if: github.event_name == 'push' || inputs.unseal_only != true

      - name: Log in to ghcr.io
        if: github.event_name == 'push' || inputs.unseal_only != true
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push
        if: github.event_name == 'push' || inputs.unseal_only != true
        uses: docker/build-push-action@v7.2.0
        with:
          context: vault
          file: vault/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ghcr.io/crvouga/chrisvouga-vault:latest
            ghcr.io/crvouga/chrisvouga-vault:${{ github.sha }}

      - name: Make package public
        if: github.event_name == 'push' || inputs.unseal_only != true
        working-directory: .
        run: bun run make-ghcr-public --id vault --require

      - name: Provision Railway service
        if: github.event_name == 'push' || inputs.unseal_only != true
        run: |
          chmod +x scripts/railway-provision.sh
          ./scripts/railway-provision.sh

      - name: Deploy to Railway
        if: github.event_name == 'push' || inputs.unseal_only != true
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          chmod +x scripts/railway-deploy.sh
          ./scripts/railway-deploy.sh

      - name: Reconcile DNS
        run: |
          chmod +x scripts/railway-sync-dns.sh
          ./scripts/railway-sync-dns.sh

      - name: Verify custom domain (pre-unseal)
        env:
          REQUIRE_HEALTHY: "false"
        run: |
          chmod +x scripts/verify-custom-domain.sh
          ./scripts/verify-custom-domain.sh

      - name: Unseal OpenBao
        run: |
          set -euo pipefail
          chmod +x scripts/install-vault-cli.sh scripts/repair-openbao-auth-mounts.sh scripts/unseal.sh
          ./scripts/install-vault-cli.sh
          ./scripts/repair-openbao-auth-mounts.sh
          ./scripts/unseal.sh

      - name: Smoke test
        run: |
          set -euo pipefail
          export VAULT_TOKEN="$(./scripts/fetch-vault-token.sh)"
          ./scripts/smoke-test.sh

      - name: Health check custom domain
        env:
          REQUIRE_HEALTHY: "true"
        run: ./scripts/verify-custom-domain.sh

      - name: Health-check vault
        working-directory: .
        run: bun run health-check --id vault
