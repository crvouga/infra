name: Deploy Pipeline

# Fly.io stack — fully automated via GitHub Actions.
#
#   prepare → dns-sync → fly-secrets → make-ghcr-public → deploy → vault-unseal → health-check
#
# Triggers:
#   - push to main
#   - repository_dispatch (deploy-service)
#   - workflow_dispatch

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - ".cursor/**"
  repository_dispatch:
    types:
      - deploy-service
  workflow_dispatch:
    inputs:
      service_id:
        description: "Single service id (empty = all services)."
        required: false
        type: string
      image_tag:
        description: "Image tag to deploy. Defaults to latest."
        required: false
        type: string
        default: latest
      apply_dns:
        description: "Apply Cloudflare DNS changes."
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  packages: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TMDB_API_READ_ACCESS_TOKEN: ${{ secrets.TMDB_API_READ_ACCESS_TOKEN }}
  TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
  TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
  TWILIO_SERVICE_SID: ${{ secrets.TWILIO_SERVICE_SID }}
  GITHUB_TOKEN_SUPER: ${{ secrets.GITHUB_TOKEN_SUPER }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
  DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
  FLY_TOKEN: ${{ secrets.FLY_TOKEN }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
  S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
  S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  S3_REGION: ${{ secrets.S3_REGION }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  NORMALIZER_APP_GOOGLE_CLIENT_ID: ${{ secrets.NORMALIZER_APP_GOOGLE_CLIENT_ID }}
  NORMALIZER_APP_GOOGLE_CLIENT_SECRET: ${{ secrets.NORMALIZER_APP_GOOGLE_CLIENT_SECRET }}
  SERVICE_ID: ${{ github.event.client_payload.id || inputs.service_id || '' }}
  IMAGE_TAG: ${{ github.event.client_payload.image_tag || inputs.image_tag || 'latest' }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      service_id: ${{ steps.resolve.outputs.service_id }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      health_check_args: ${{ steps.resolve.outputs.health_check_args }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run generate-fly --check
      - id: resolve
        run: |
          set -euo pipefail
          SID="${SERVICE_ID}"
          TAG="${IMAGE_TAG}"
          HC_ARGS=()
          if [ -n "${SID}" ]; then
            HC_ARGS+=(--id "${SID}")
          fi
          echo "service_id=${SID}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "health_check_args=${HC_ARGS[*]}" >> "$GITHUB_OUTPUT"
          echo "Deploy: service_id='${SID:-all}' image_tag='${TAG}'"

  make-ghcr-public:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - run: bun run make-ghcr-public
        env:
          GH_TOKEN: ${{ github.token }}

  dns-sync:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - name: Reconcile DNS
        env:
          SERVICE_ID: ${{ needs.prepare.outputs.service_id }}
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          if [ -n "${SERVICE_ID}" ]; then ARGS+=(--id "${SERVICE_ID}"); fi
          bun run sync-dns "${ARGS[@]}"
      - name: Ensure apex redirect
        env:
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          bun run sync-redirects "${ARGS[@]}"
      - name: Ensure domain aliases
        env:
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          bun run sync-aliases "${ARGS[@]}"

  fly-secrets:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        id: vault_secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Sync Fly secrets
        if: ${{ secrets.FLY_TOKEN != '' }}
        env:
          FLY_API_TOKEN: ${{ env.FLY_TOKEN }}
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_TOKEN:-}" ]; then
            echo "ERROR: FLY_TOKEN is required" >&2
            exit 1
          fi
          if [ -n "${DB_CONNECTION_URI:-}" ]; then
            {
              echo "DB_CONNECTION_URI<<EOF"
              echo "${DB_CONNECTION_URI}"
              echo "EOF"
            } >> "$GITHUB_ENV"
          fi
          ARGS=()
          if [ -n "${{ needs.prepare.outputs.service_id }}" ]; then
            ARGS+=(--id "${{ needs.prepare.outputs.service_id }}")
          fi
          bun run sync-fly-secrets "${ARGS[@]}"

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ env.FLY_TOKEN }}
          GH_TOKEN: ${{ env.GITHUB_TOKEN_SUPER || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_TOKEN:-}" ]; then
            echo "ERROR: FLY_TOKEN is required" >&2
            exit 1
          fi
          ARGS=(--image-tag "${{ needs.prepare.outputs.image_tag }}" --continue-on-error)
          if [ -n "${{ needs.prepare.outputs.service_id }}" ]; then
            ARGS+=(--id "${{ needs.prepare.outputs.service_id }}")
          fi
          bun run deploy-fly "${ARGS[@]}"

  vault-unseal:
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    if: >-
      ${{
        needs.deploy.result == 'success'
        && (
          needs.prepare.outputs.service_id == ''
          || needs.prepare.outputs.service_id == 'vault'
        )
      }}
    steps:
      - uses: actions/checkout@v5
        with:
          repository: crvouga/vault
          token: ${{ github.token }}
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release jq
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
      - name: Unseal OpenBao on Fly
        env:
          VAULT_ADDR: https://crvouga-vault.fly.dev
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          if [ -z "${DB_CONNECTION_URI:-}" ]; then
            echo "ERROR: DB_CONNECTION_URI GitHub secret is not set on this repo" >&2
            exit 1
          fi
          chmod +x scripts/install-vault-cli.sh scripts/repair-openbao-auth-mounts.sh scripts/unseal.sh
          ./scripts/install-vault-cli.sh
          ./scripts/repair-openbao-auth-mounts.sh
          ./scripts/unseal.sh
      - name: Smoke test
        env:
          VAULT_ADDR: https://crvouga-vault.fly.dev
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          chmod +x scripts/install-vault-cli.sh scripts/fetch-vault-token.sh scripts/smoke-test.sh
          ./scripts/install-vault-cli.sh
          export VAULT_TOKEN="$(./scripts/fetch-vault-token.sh)"
          ./scripts/smoke-test.sh

  dns-sync-post:
    runs-on: ubuntu-latest
    needs: [prepare, vault-unseal]
    if: needs.vault-unseal.result == 'success'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: https://crvouga-vault.fly.dev
      - name: Reconcile DNS
        env:
          SERVICE_ID: ${{ needs.prepare.outputs.service_id }}
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          if [ -n "${SERVICE_ID}" ]; then ARGS+=(--id "${SERVICE_ID}"); fi
          bun run sync-dns "${ARGS[@]}"
      - name: Ensure apex redirect
        env:
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          bun run sync-redirects "${ARGS[@]}"
      - name: Ensure domain aliases
        env:
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          bun run sync-aliases "${ARGS[@]}"

  health-check:
    runs-on: ubuntu-latest
    needs: [prepare, deploy, vault-unseal, dns-sync-post]
    if: >-
      ${{
        needs.deploy.result == 'success'
        && (
          needs.vault-unseal.result == 'success'
          || needs.vault-unseal.result == 'skipped'
        )
        && (
          needs.dns-sync-post.result == 'success'
          || needs.dns-sync-post.result == 'skipped'
        )
      }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Health-check services
        run: |
          set -euo pipefail
          ARGS=(${{ needs.prepare.outputs.health_check_args }})
          bun run health-check "${ARGS[@]}"
