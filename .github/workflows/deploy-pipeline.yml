name: Deploy Pipeline

# Fly.io stack — fully automated via GitHub Actions.
#
#   prepare → dns-sync → fly-secrets → make-ghcr-public → deploy → vault-unseal → health-check
#
# Triggers:
#   - push to main
#   - repository_dispatch (deploy-service)
#   - workflow_dispatch

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - ".cursor/**"
  repository_dispatch:
    types:
      - deploy-service
  workflow_dispatch:
    inputs:
      service_id:
        description: "Single service id (empty = all services)."
        required: false
        type: string
      image_tag:
        description: "Image tag to deploy. Defaults to latest."
        required: false
        type: string
        default: latest
      apply_dns:
        description: "Apply Cloudflare DNS changes."
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  packages: write

env:
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TMDB_API_READ_ACCESS_TOKEN: ${{ secrets.TMDB_API_READ_ACCESS_TOKEN }}
  TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
  TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
  TWILIO_SERVICE_SID: ${{ secrets.TWILIO_SERVICE_SID }}
  GITHUB_TOKEN_SUPER: ${{ secrets.GITHUB_TOKEN_SUPER }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
  FLY_TOKEN: ${{ secrets.FLY_TOKEN }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
  S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
  S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  S3_REGION: ${{ secrets.S3_REGION }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  NORMALIZER_APP_GOOGLE_CLIENT_ID: ${{ secrets.NORMALIZER_APP_GOOGLE_CLIENT_ID }}
  NORMALIZER_APP_GOOGLE_CLIENT_SECRET: ${{ secrets.NORMALIZER_APP_GOOGLE_CLIENT_SECRET }}
  SERVICE_ID: ${{ github.event.client_payload.id || inputs.service_id || '' }}
  IMAGE_TAG: ${{ github.event.client_payload.image_tag || inputs.image_tag || 'latest' }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      service_id: ${{ steps.resolve.outputs.service_id }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      health_check_args: ${{ steps.resolve.outputs.health_check_args }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run generate-fly --check
      - id: resolve
        run: |
          set -euo pipefail
          SID="${SERVICE_ID}"
          TAG="${IMAGE_TAG}"
          HC_ARGS=()
          if [ -n "${SID}" ]; then
            HC_ARGS+=(--id "${SID}")
          fi
          echo "service_id=${SID}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "health_check_args=${HC_ARGS[*]}" >> "$GITHUB_OUTPUT"
          echo "Deploy: service_id='${SID:-all}' image_tag='${TAG}'"

  make-ghcr-public:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - run: bun run make-ghcr-public
        env:
          GH_TOKEN: ${{ github.token }}

  dns-sync:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - name: Reconcile DNS
        env:
          SERVICE_ID: ${{ needs.prepare.outputs.service_id }}
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          if [ -n "${SERVICE_ID}" ]; then ARGS+=(--id "${SERVICE_ID}"); fi
          bun run sync-dns "${ARGS[@]}"
      - name: Ensure apex redirect
        env:
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          bun run sync-redirects "${ARGS[@]}"
      - name: Ensure domain aliases
        env:
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          bun run sync-aliases "${ARGS[@]}"

  fly-secrets:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        id: vault_secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Sync Fly secrets
        if: steps.vault_secrets.outputs.vault_available == 'true'
        env:
          FLY_API_TOKEN: ${{ env.FLY_TOKEN }}
          DB_CONNECTION_URI: ${{ secrets.DB_CONNECTION_URI }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_TOKEN:-}" ]; then
            echo "ERROR: FLY_TOKEN is required" >&2
            exit 1
          fi
          if [ -z "${DB_CONNECTION_URI:-}" ]; then
            echo "ERROR: DB_CONNECTION_URI GitHub secret is not set on this repo" >&2
            exit 1
          fi
          {
            echo "DB_CONNECTION_URI<<EOF"
            echo "${DB_CONNECTION_URI}"
            echo "EOF"
          } >> "$GITHUB_ENV"
          ARGS=()
          if [ -n "${{ needs.prepare.outputs.service_id }}" ]; then
            ARGS+=(--id "${{ needs.prepare.outputs.service_id }}")
          fi
          bun run sync-fly-secrets "${ARGS[@]}"
      - name: Skip Fly secrets (Vault unavailable)
        if: steps.vault_secrets.outputs.vault_available != 'true'
        run: |
          echo "::warning::Vault unavailable — skipping sync-fly-secrets"

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ env.FLY_TOKEN }}
          GH_TOKEN: ${{ env.GITHUB_TOKEN_SUPER || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_TOKEN:-}" ]; then
            echo "ERROR: FLY_TOKEN is required" >&2
            exit 1
          fi
          ARGS=(--image-tag "${{ needs.prepare.outputs.image_tag }}" --continue-on-error)
          if [ -n "${{ needs.prepare.outputs.service_id }}" ]; then
            ARGS+=(--id "${{ needs.prepare.outputs.service_id }}")
          fi
          bun run deploy-fly "${ARGS[@]}"

  vault-unseal:
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    if: >-
      ${{
        needs.deploy.result == 'success'
        && (
          needs.prepare.outputs.service_id == ''
          || needs.prepare.outputs.service_id == 'vault'
        )
      }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - name: Install gh CLI
        run: |
          type -p curl >/dev/null || sudo apt install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
      - name: Unseal vault after deploy
        env:
          GITHUB_TOKEN_SUPER: ${{ env.GITHUB_TOKEN_SUPER }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${GITHUB_TOKEN_SUPER}"
          BEFORE="$(gh run list --workflow=unseal.yml --repo crvouga/vault --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
          gh workflow run unseal.yml --repo crvouga/vault --ref main
          RUN_ID=""
          for _ in $(seq 1 30); do
            RUN_ID="$(gh run list --workflow=unseal.yml --repo crvouga/vault --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
            if [ -n "${RUN_ID}" ] && [ "${RUN_ID}" != "${BEFORE}" ]; then
              break
            fi
            sleep 2
          done
          if [ -z "${RUN_ID}" ]; then
            echo "Timed out waiting for vault unseal workflow run"
            exit 1
          fi
          gh run watch "${RUN_ID}" --repo crvouga/vault --exit-status

  health-check:
    runs-on: ubuntu-latest
    needs: [prepare, deploy, vault-unseal]
    if: >-
      ${{
        needs.deploy.result == 'success'
        && (
          needs.vault-unseal.result == 'success'
          || needs.vault-unseal.result == 'skipped'
        )
      }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Health-check services
        run: |
          set -euo pipefail
          ARGS=(${{ needs.prepare.outputs.health_check_args }})
          bun run health-check "${ARGS[@]}"
