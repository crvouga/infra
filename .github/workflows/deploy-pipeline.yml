name: Deploy Pipeline

# Fly.io stack — fully automated via GitHub Actions.
#
#   prepare → dns-sync → make-ghcr-public → fly-deploy (matrix) → health-check
#
# Secrets: Vault OIDC via .github/actions/vault-secrets (not GitHub repo secrets).
#
# Triggers:
#   - push to main
#   - repository_dispatch (deploy-service)
#   - workflow_dispatch

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - ".vscode/**"
      - ".cursor/**"
  repository_dispatch:
    types:
      - deploy-service
  workflow_dispatch:
    inputs:
      service_id:
        description: "Single service id (empty = all services)."
        required: false
        type: string
      image_tag:
        description: "Image tag to deploy. Defaults to latest."
        required: false
        type: string
        default: latest
      apply_dns:
        description: "Apply Cloudflare DNS changes."
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  packages: write

env:
  SERVICE_ID: ${{ github.event.client_payload.id || inputs.service_id || '' }}
  IMAGE_TAG: ${{ github.event.client_payload.image_tag || inputs.image_tag || 'latest' }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      service_id: ${{ steps.resolve.outputs.service_id }}
      service_ids: ${{ steps.resolve.outputs.service_ids }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      health_check_args: ${{ steps.resolve.outputs.health_check_args }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run generate-fly --check
      - id: resolve
        run: |
          set -euo pipefail
          SID="${SERVICE_ID}"
          TAG="${IMAGE_TAG}"
          HC_ARGS=()
          if [ -n "${SID}" ]; then
            HC_ARGS+=(--id "${SID}")
          fi
          if [ -n "${SID}" ]; then
            SERVICE_IDS="$(bun run scripts/list-deploy-service-ids.ts --id "${SID}")"
          else
            SERVICE_IDS="$(bun run scripts/list-deploy-service-ids.ts)"
          fi
          echo "service_id=${SID}" >> "$GITHUB_OUTPUT"
          echo "service_ids=${SERVICE_IDS}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "health_check_args=${HC_ARGS[*]}" >> "$GITHUB_OUTPUT"
          echo "Deploy: service_id='${SID:-all}' services=${SERVICE_IDS} image_tag='${TAG}'"

  make-ghcr-public:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - run: bun run make-ghcr-public
        env:
          GH_TOKEN: ${{ github.token }}

  dns-sync:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Reconcile DNS
        env:
          FLY_API_TOKEN: ${{ env.FLY_TOKEN }}
          SERVICE_ID: ${{ needs.prepare.outputs.service_id }}
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          if [ -n "${SERVICE_ID}" ]; then ARGS+=(--id "${SERVICE_ID}"); fi
          bun run sync-dns "${ARGS[@]}"
      - name: Ensure apex redirect
        env:
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          bun run sync-redirects "${ARGS[@]}"
      - name: Ensure domain aliases
        env:
          CF_APPLY: ${{ github.event_name == 'push' || inputs.apply_dns != false }}
        run: |
          set -euo pipefail
          ARGS=()
          if [ "${CF_APPLY}" = "true" ]; then ARGS+=(--apply); fi
          bun run sync-aliases "${ARGS[@]}"

  fly-deploy:
    runs-on: ubuntu-latest
    needs: prepare
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        service_id: ${{ fromJson(needs.prepare.outputs.service_ids) }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"
      - uses: ./.github/actions/vault-secrets
        with:
          vault_addr: ${{ env.VAULT_ADDR }}
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Sync Fly secrets
        env:
          FLY_API_TOKEN: ${{ env.FLY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_TOKEN:-}" ]; then
            echo "::warning::FLY_TOKEN not set — skipping sync-fly-secrets"
            exit 0
          fi
          bun run sync-fly-secrets --id "${{ matrix.service_id }}"
      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ env.FLY_TOKEN }}
          GH_TOKEN: ${{ env.GITHUB_TOKEN_SUPER || github.token }}
        run: |
          set -euo pipefail
          if [ -z "${FLY_TOKEN:-}" ]; then
            echo "ERROR: FLY_TOKEN is required" >&2
            exit 1
          fi
          bun run deploy-fly \
            --id "${{ matrix.service_id }}" \
            --image-tag "${{ needs.prepare.outputs.image_tag }}"

  health-check:
    runs-on: ubuntu-latest
    needs: [prepare, fly-deploy]
    if: needs.fly-deploy.result == 'success'
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Health-check services
        run: |
          set -euo pipefail
          ARGS=(${{ needs.prepare.outputs.health_check_args }})
          bun run health-check "${ARGS[@]}"
