name: Recover stack

# Bootstrap always-on services when Vault is down (504) and normal deploy cannot auth.
# Requires GitHub repo secrets: NODE_SSH_HOST, NODE_SSH_USER, NODE_SSH_KEY, GITHUB_TOKEN_SUPER

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run scripts/print-platform-env.ts --format github >> "$GITHUB_ENV"

      - name: Validate SSH secrets
        env:
          NODE_SSH_HOST: ${{ secrets.NODE_SSH_HOST }}
          NODE_SSH_USER: ${{ secrets.NODE_SSH_USER }}
          NODE_SSH_KEY: ${{ secrets.NODE_SSH_KEY }}
          GITHUB_TOKEN_SUPER: ${{ secrets.GITHUB_TOKEN_SUPER }}
        run: |
          set -euo pipefail
          for v in NODE_SSH_HOST NODE_SSH_USER NODE_SSH_KEY GITHUB_TOKEN_SUPER; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing GitHub repo secret: ${v}" >&2
              exit 1
            fi
          done

      - name: Rsync stack files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.NODE_SSH_HOST }}
          username: ${{ secrets.NODE_SSH_USER }}
          key: ${{ secrets.NODE_SSH_KEY }}
          source: "docker-compose.yml,traefik,services.yaml,lib,package.json,bun.lock,scripts/bootstrap-node.sh,scripts/deploy.sh,scripts/start-stack.sh,scripts/ghcr-login.sh,scripts/recover-stack.sh,apps/service-orchestrator,dozzle"
          target: ${{ env.DEPLOY_DIR }}
          strip_components: 0
          overwrite: true

      - name: Recover always-on stack on node
        uses: appleboy/ssh-action@v1.2.0
        env:
          GITHUB_TOKEN_SUPER: ${{ secrets.GITHUB_TOKEN_SUPER }}
        with:
          host: ${{ secrets.NODE_SSH_HOST }}
          username: ${{ secrets.NODE_SSH_USER }}
          key: ${{ secrets.NODE_SSH_KEY }}
          envs: GITHUB_TOKEN_SUPER
          script: |
            set -euo pipefail
            export GITHUB_TOKEN_SUPER="${GITHUB_TOKEN_SUPER}"
            cd ${{ env.DEPLOY_DIR }}
            chmod +x scripts/*.sh
            bash scripts/recover-stack.sh

      - name: Install gh CLI
        env:
          GITHUB_TOKEN_SUPER: ${{ secrets.GITHUB_TOKEN_SUPER }}
        run: |
          type -p curl >/dev/null || sudo apt install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Unseal vault
        env:
          GITHUB_TOKEN_SUPER: ${{ secrets.GITHUB_TOKEN_SUPER }}
        run: |
          set -euo pipefail
          export GH_TOKEN="${GITHUB_TOKEN_SUPER}"
          echo "Waiting 30s for vault container..."
          sleep 30
          gh workflow run unseal.yml --repo crvouga/vault --ref main
          RUN_ID=""
          for _ in $(seq 1 30); do
            RUN_ID="$(gh run list --workflow=unseal.yml --repo crvouga/vault --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
            if [ -n "${RUN_ID}" ]; then break; fi
            sleep 2
          done
          if [ -n "${RUN_ID}" ]; then
            gh run watch "${RUN_ID}" --repo crvouga/vault --exit-status || true
          fi
          echo "Recovery done. Re-run Deploy Pipeline once https://vault.chrisvouga.dev responds."
