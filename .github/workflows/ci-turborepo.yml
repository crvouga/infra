# CI + optional image publish for turborepo. Deploy is via deploy-fleet (repository_dispatch).
#
# Secrets: Vault OIDC via .github/actions/turborepo-vault-secrets (not GitHub repo secrets).
name: CI turborepo

permissions:
  contents: read
  id-token: write
  packages: write

on:
  push:
    branches: [main]
    paths:
      - turborepo/**
  pull_request:
    paths:
      - turborepo/**
  workflow_dispatch:
    inputs:
      publish:
        description: Build and push GHCR image, then dispatch fleet deploy
        type: boolean
        default: false

defaults:
  run:
    working-directory: turborepo

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: ci-turborepo-${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
      cancel-in-progress: true
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Import Vault secrets (dev)
        uses: ./.github/actions/turborepo-vault-secrets
        with:
          vault_config: dev
      - name: Verify Vault secrets (dev)
        env:
          CI: true
          GITHUB_ACTIONS: true
          VAULT_CONFIG: dev
          VAULT_PROJECT: personal
        run: bun run scripts/check-vault-secrets.ts
      - name: Turbo CI (format, tc, lint, test, build)
        run: bun run check

  smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    defaults:
      run:
        working-directory: turborepo
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Import Vault secrets (prd)
        uses: ./.github/actions/turborepo-vault-secrets
        with:
          vault_config: prd
      - name: Smoke test remote cache
        env:
          CI: true
          GITHUB_ACTIONS: true
          VAULT_CONFIG: prd
          VAULT_PROJECT: personal
        run: bun run scripts/smoke-test-cache.ts

  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    outputs:
      publish: ${{ steps.filter.outputs.publish }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - id: filter
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only HEAD~1 HEAD | grep -qE '^turborepo/(apps/api/|package\.json$|bun\.lock$)'; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: [check, changes]
    if: |
      always() &&
      needs.check.result == 'success' &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.publish == 'true' &&
      github.ref == 'refs/heads/main'
    uses: ./.github/workflows/publish-image.yml
    secrets:
      DEPLOY_DISPATCH_TOKEN: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
    with:
      service_id: turborepo
      dockerfile: turborepo/apps/api/Dockerfile
      context: turborepo
      image_prefix: chrisvouga
