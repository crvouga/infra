# CI checks on every push/PR. Image publish is in publish-image.yml; deploy is via chrisvouga.dev.
#
# Secrets: Vault OIDC via .github/actions/vault-secrets (not GitHub repo secrets).
name: Deployment Pipeline

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: check-${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
      cancel-in-progress: true
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Import Vault secrets (dev)
        uses: ./.github/actions/vault-secrets
        with:
          vault_config: dev
      - name: Verify Vault secrets (dev)
        env:
          CI: true
          GITHUB_ACTIONS: true
          VAULT_CONFIG: dev
          VAULT_PROJECT: personal
        run: bun run scripts/check-vault-secrets.ts
      - name: Turbo CI (format, tc, lint, test, build)
        run: bun run check

  smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Import Vault secrets (prd)
        uses: ./.github/actions/vault-secrets
        with:
          vault_config: prd
      - name: Smoke test remote cache
        env:
          CI: true
          GITHUB_ACTIONS: true
          VAULT_CONFIG: prd
          VAULT_PROJECT: personal
        run: bun run scripts/smoke-test-cache.ts
