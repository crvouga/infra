# CI checks on every push/PR. Image publish is in publish-image.yml; deploy is via chrisvouga.dev.
name: Deployment Pipeline

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    concurrency:
      group: check-${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
      cancel-in-progress: true
    timeout-minutes: 20
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_API: ${{ secrets.TURBO_API }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: ${{ secrets.TURBO_CACHE }}
      B2_S3_ENDPOINT: ${{ secrets.B2_S3_ENDPOINT }}
      B2_S3_REGION: ${{ secrets.B2_S3_REGION }}
      B2_S3_ACCESS_KEY_ID: ${{ secrets.B2_S3_ACCESS_KEY_ID }}
      B2_S3_SECRET_ACCESS_KEY: ${{ secrets.B2_S3_SECRET_ACCESS_KEY }}
      B2_BUCKET: ${{ secrets.B2_BUCKET }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Import Vault secrets (dev)
        uses: ./.github/actions/vault-secrets
        with:
          vault_config: dev
      - name: Verify Vault secrets (dev)
        env:
          CI: true
          GITHUB_ACTIONS: true
          VAULT_CONFIG: dev
          VAULT_PROJECT: personal
        run: bun run scripts/check-vault-secrets.ts
      - name: Turbo CI (format, tc, lint, test, build)
        run: bun run check

  smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_API: ${{ secrets.TURBO_API }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_CACHE: ${{ secrets.TURBO_CACHE }}
      B2_S3_ENDPOINT: ${{ secrets.B2_S3_ENDPOINT }}
      B2_S3_REGION: ${{ secrets.B2_S3_REGION }}
      B2_S3_ACCESS_KEY_ID: ${{ secrets.B2_S3_ACCESS_KEY_ID }}
      B2_S3_SECRET_ACCESS_KEY: ${{ secrets.B2_S3_SECRET_ACCESS_KEY }}
      B2_BUCKET: ${{ secrets.B2_BUCKET }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Import Vault secrets (prd)
        uses: ./.github/actions/vault-secrets
        with:
          vault_config: prd
      - name: Smoke test remote cache
        env:
          CI: true
          GITHUB_ACTIONS: true
          VAULT_CONFIG: prd
          VAULT_PROJECT: personal
        run: bun run scripts/smoke-test-cache.ts
