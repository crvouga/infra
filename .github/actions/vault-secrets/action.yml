name: Vault secrets (OIDC)
description: Authenticate to OpenBao via GitHub OIDC and export pipeline secrets
inputs:
  vault_addr:
    description: "Vault API URL (from services.yaml zone)"
    required: true
  allow_missing_node_ssh:
    description: "Skip loading NODE_SSH_* (Setup / Provision node — provision writes them)"
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - uses: hashicorp/vault-action@v3
      with:
        url: ${{ inputs.vault_addr }}
        method: jwt
        path: jwt
        role: github-actions
        jwtGithubAudience: ${{ inputs.vault_addr }}
        secrets: |
          secret/data/personal/prd CLOUDFLARE_API_TOKEN | CLOUDFLARE_API_TOKEN ;
          secret/data/personal/prd CLOUDFLARE_ACCOUNT_ID | CLOUDFLARE_ACCOUNT_ID ;
          secret/data/personal/prd TMDB_API_READ_ACCESS_TOKEN | TMDB_API_READ_ACCESS_TOKEN ;
          secret/data/personal/prd TWILIO_ACCOUNT_SID | TWILIO_ACCOUNT_SID ;
          secret/data/personal/prd TWILIO_AUTH_TOKEN | TWILIO_AUTH_TOKEN ;
          secret/data/personal/prd TWILIO_SERVICE_SID | TWILIO_SERVICE_SID ;
          secret/data/personal/prd DIGITALOCEAN_TOKEN | DIGITALOCEAN_TOKEN ;
          secret/data/personal/prd GITHUB_TOKEN_SUPER | GITHUB_TOKEN_SUPER ;
          secret/data/personal/prd VAULT_TOKEN | VAULT_TOKEN ;
          secret/data/personal/prd DATABASE_URL | DATABASE_URL ;
          secret/data/personal/prd S3_ENDPOINT | S3_ENDPOINT ;
          secret/data/personal/prd S3_ACCESS_KEY_ID | S3_ACCESS_KEY ;
          secret/data/personal/prd S3_SECRET_ACCESS_KEY | S3_SECRET_KEY ;
          secret/data/personal/prd S3_BUCKET | S3_BUCKET ;
          secret/data/personal/prd S3_REGION | S3_REGION ;
          secret/data/personal/prd OPENAI_API_KEY | OPENAI_API_KEY ;
          secret/data/personal/prd NORMALIZER_APP_GOOGLE_CLIENT_ID | NORMALIZER_APP_GOOGLE_CLIENT_ID ;
          secret/data/personal/prd NORMALIZER_APP_GOOGLE_CLIENT_SECRET | NORMALIZER_APP_GOOGLE_CLIENT_SECRET ;
          secret/data/personal/prd NETDATA_USERNAME | NETDATA_USERNAME ;
          secret/data/personal/prd NETDATA_PASSWORD | NETDATA_PASSWORD ;
          secret/data/personal/prd DOZZLE_USERNAME | DOZZLE_USERNAME ;
          secret/data/personal/prd DOZZLE_PASSWORD | DOZZLE_PASSWORD ;
          secret/data/personal/prd DOZZLE_EMAIL | DOZZLE_EMAIL ;
    - if: ${{ inputs.allow_missing_node_ssh != 'true' }}
      uses: hashicorp/vault-action@v3
      with:
        url: ${{ inputs.vault_addr }}
        method: jwt
        path: jwt
        role: github-actions
        jwtGithubAudience: ${{ inputs.vault_addr }}
        secrets: |
          secret/data/personal/prd NODE_SSH_HOST | NODE_SSH_HOST ;
          secret/data/personal/prd NODE_SSH_USER | NODE_SSH_USER ;
          secret/data/personal/prd NODE_SSH_KEY | NODE_SSH_KEY
