name = "turborepo-remote-cache"
main = "src/api.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "no_handle_cross_request_promise_resolution"]
workers_dev = false
preview_urls = false

routes = [{ pattern = "turborepo.chrisvouga.dev", custom_domain = true }]

# Doppler scope for Worker boot (see apps/api/src/config/env.ts). Only
# DOPPLER_TOKEN is a Wrangler secret; project/config must be plain vars.
[env.dev]
vars = { DOPPLER_PROJECT = "personal", DOPPLER_CONFIG = "dev" }

[env.prd]
name = "turborepo-remote-cache"
vars = { DOPPLER_PROJECT = "personal", DOPPLER_CONFIG = "prd" }

[observability]
[observability.logs]
enabled = true
invocation_logs = true
