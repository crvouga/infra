# AUTO-GENERATED by scripts/generate-fly.ts — do not edit by hand.
# Regenerate: bun run generate-fly

app = "crvouga-normalizer"
primary_region = "iad"

[build]
  image = "ghcr.io/crvouga/chrisvouga-normalizer:latest"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "10s"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  SERVER_BASE_URL = "https://normalizer.chrisvouga.dev"
