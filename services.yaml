# Single source of truth for Railway deployments.
# Images are built and pushed by each project repo — this repo only consumes them.

zone: chrisvouga.dev
image_owner: crvouga
image_prefix: chrisvouga
default_image_tag: latest
infra_github_repo: crvouga/infra
skip_rollout_repos:
  - crvouga/portfolio
  - crvouga/infra

railway:
  project: crvouga-infra
  environment: production
  region: us-east4
  service_prefix: crvouga

services:
  - id: portfolio
    hostname: www.chrisvouga.dev
    github_repo: crvouga/portfolio
    source_code_url: https://github.com/crvouga/portfolio
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: moviefinder-app-rust
    hostname: moviefinder-app-rust.chrisvouga.dev
    github_repo: crvouga/moviefinder.app-rust
    source_code_url: https://github.com/crvouga/moviefinder.app-rust
    dockerfile: ./Dockerfile
    build_context: .
    port: 3000
    health_check: true
    env:
      PORT: "3000"
    secrets: &moviefinder_secrets
      - name: DATABASE_URL
        source: vault
      - name: TMDB_API_READ_ACCESS_TOKEN
        source: vault
      - name: TWILIO_ACCOUNT_SID
        source: vault
      - name: TWILIO_AUTH_TOKEN
        source: vault
      - name: TWILIO_SERVICE_SID
        source: vault

  - id: moviefinder-app-react
    hostname: moviefinder-app-react.chrisvouga.dev
    github_repo: crvouga/moviefinder.app-react
    source_code_url: https://github.com/crvouga/moviefinder.app-react
    dockerfile: ./Dockerfile
    build_context: .
    port: 3000
    health_check: true
    env:
      PORT: "3000"
    secrets: *moviefinder_secrets

  - id: moviefinder-app-clojurescript
    hostname: moviefinder-app-clojurescript.chrisvouga.dev
    github_repo: crvouga/moviefinder.app-clojurescript
    source_code_url: https://github.com/crvouga/moviefinder.app-clojurescript
    dockerfile: ./Dockerfile
    build_context: .
    port: 9630
    health_check: true
    env:
      PORT: "9630"
    secrets: *moviefinder_secrets

  - id: headless-combobox-svelte-example
    hostname: svelte-headlesscombobox.chrisvouga.dev
    github_repo: crvouga/headless-combobox
    source_code_url: https://github.com/crvouga/headless-combobox
    dockerfile: example/svelte/Dockerfile
    build_context: example/svelte
    port: 80
    health_check: true

  - id: headless-combobox-docs
    hostname: headlesscombobox.chrisvouga.dev
    github_repo: crvouga/headless-combobox
    source_code_url: https://github.com/crvouga/headless-combobox
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: todo-app
    hostname: todo.chrisvouga.dev
    github_repo: crvouga/todo-v1
    source_code_url: https://github.com/crvouga/todo-v1
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: image-service
    hostname: imageservice.chrisvouga.dev
    github_repo: crvouga/image-service
    source_code_url: https://github.com/crvouga/image-service
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true
    # "/" redirects to /login/send-link; health checks do not follow redirects.
    # Railway rejects hyphens in healthcheckPath — deploy healthcheck skipped; external checks use this path.
    health_path: /login/send-link

  - id: connect-four
    hostname: connectfour.chrisvouga.dev
    github_repo: crvouga/connect-four
    source_code_url: https://github.com/crvouga/connect-four
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: anime-blog
    hostname: anime.chrisvouga.dev
    github_repo: crvouga/anime
    source_code_url: https://github.com/crvouga/anime
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: snake-game
    hostname: snake.chrisvouga.dev
    github_repo: crvouga/snake
    source_code_url: https://github.com/crvouga/snake
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: match-three
    hostname: matchthree.chrisvouga.dev
    github_repo: crvouga/match-three
    source_code_url: https://github.com/crvouga/match-three
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: simon-says
    hostname: simonsays.chrisvouga.dev
    github_repo: crvouga/simon-says
    source_code_url: https://github.com/crvouga/simon-says
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: turborepo
    hostname: turborepo.chrisvouga.dev
    github_repo: crvouga/infra
    source_code_url: https://github.com/crvouga/infra/tree/main/turborepo
    dockerfile: turborepo/apps/api/Dockerfile
    build_context: turborepo
    port: 8080
    health_check: true
    health_path: /health
    env:
      PORT: "8080"
      VAULT_ADDR: "https://vault.chrisvouga.dev"
      VAULT_PROJECT: "personal"
      VAULT_CONFIG: "prd"
    secrets:
      - name: VAULT_TOKEN
        source: vault

  - id: llm-proxy
    hostname: llm-proxy.chrisvouga.dev
    github_repo: crvouga/llm-server
    source_code_url: https://github.com/crvouga/llm-server
    dockerfile: proxy/Dockerfile
    build_context: proxy
    port: 8080
    health_check: true
    # "/" 302-redirects non-bot User-Agents to /ui — health checks must hit a 200 path.
    health_path: /ui
    env:
      PORT: "8080"
    secrets:
      - name: DATABASE_URL
        source: vault

  - id: vault
    hostname: vault.chrisvouga.dev
    standalone: true
    github_repo: crvouga/infra
    source_code_url: https://github.com/crvouga/infra/tree/main/vault
    dockerfile: vault/Dockerfile
    build_context: vault
    port: 8200
    health_check: true
    # External checks use OpenBao's sealedcode/uninitcode query params.
    # Railway health checks hit the in-container proxy, which returns 200 before unseal.
    health_path: /v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200
    railway:
      sleep: false
      health_path: /railway-health
    env:
      BAO_API_ADDR: "https://vault.chrisvouga.dev"
    secrets:
      - name: DB_CONNECTION_URI
        source: env
