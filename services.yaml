# Single source of truth for the single-node Docker stack.
# Images are built and pushed by each project repo — this repo only consumes them.

zone: chrisvouga.dev
origin_hostname: origin.chrisvouga.dev
image_owner: crvouga
default_image_tag: latest
do_project_name: projects
droplet_name: origin
infra_github_repo: crvouga/infra
skip_rollout_repos:
  - crvouga/portfolio

services:
  - id: portfolio
    hostname: www.chrisvouga.dev
    github_repo: crvouga/portfolio
    source_code_url: https://github.com/crvouga/portfolio
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: pickflix
    hostname: pickflix.chrisvouga.dev
    github_repo: crvouga/pickflix-v1
    source_code_url: https://github.com/crvouga/pickflix-v1
    dockerfile: ./Dockerfile
    build_context: .
    port: 9000
    health_check: true
    env:
      PORT: "9000"
    secrets:
      - name: DATABASE_URL
        source: literal
        value: noop
      - name: PORT
        source: literal
        value: "9000"
      - name: SECRET
        source: literal
        value: noop
      - name: SEND_GRID_API_KEY
        source: literal
        value: noop
      - name: SEND_GRID_REGISTERED_EMAIL_ADDRESS
        source: literal
        value: noop
      - name: SESSION_COOKIE_SECRET
        source: literal
        value: noop
      - name: YOUTUBE_API_KEY
        source: literal
        value: noop
      - name: TMDB_API_READ_ACCESS_TOKEN
        source: vault

  - id: moviefinder-app-rust
    hostname: moviefinder-app-rust.chrisvouga.dev
    github_repo: crvouga/moviefinder.app-rust
    source_code_url: https://github.com/crvouga/moviefinder.app-rust
    dockerfile: ./Dockerfile
    build_context: .
    port: 3000
    health_check: true
    env:
      PORT: "3000"
    secrets: &moviefinder_secrets
      - name: TMDB_API_READ_ACCESS_TOKEN
        source: vault
      - name: TWILIO_ACCOUNT_SID
        source: vault
      - name: TWILIO_AUTH_TOKEN
        source: vault
      - name: TWILIO_SERVICE_SID
        source: vault

  - id: moviefinder-app-go
    hostname: moviefinder-app-go.chrisvouga.dev
    github_repo: crvouga/moviefinder.app-go
    source_code_url: https://github.com/crvouga/moviefinder.app-go
    dockerfile: ./Dockerfile
    build_context: .
    port: 8080
    health_check: true
    env:
      PORT: "8080"
    secrets: *moviefinder_secrets

  - id: moviefinder-app-react
    hostname: moviefinder-app-react.chrisvouga.dev
    github_repo: crvouga/moviefinder.app-react
    source_code_url: https://github.com/crvouga/moviefinder.app-react
    dockerfile: ./Dockerfile
    build_context: .
    port: 3000
    health_check: true
    env:
      PORT: "3000"
    secrets: *moviefinder_secrets

  - id: moviefinder-app-clojurescript
    hostname: moviefinder-app-clojurescript.chrisvouga.dev
    github_repo: crvouga/moviefinder.app-clojurescript
    source_code_url: https://github.com/crvouga/moviefinder.app-clojurescript
    dockerfile: ./Dockerfile
    build_context: .
    port: 9630
    health_check: true
    env:
      PORT: "9630"
    secrets: *moviefinder_secrets

  - id: headless-combobox-svelte-example
    hostname: svelte-headlesscombobox.chrisvouga.dev
    github_repo: crvouga/headless-combobox
    source_code_url: https://github.com/crvouga/headless-combobox
    dockerfile: example/svelte/Dockerfile
    build_context: example/svelte
    port: 80
    health_check: true

  - id: headless-combobox-docs
    hostname: headlesscombobox.chrisvouga.dev
    github_repo: crvouga/headless-combobox
    source_code_url: https://github.com/crvouga/headless-combobox
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: todo-app
    hostname: todo.chrisvouga.dev
    github_repo: crvouga/todo-v1
    source_code_url: https://github.com/crvouga/todo-v1
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: image-service
    hostname: imageservice.chrisvouga.dev
    github_repo: crvouga/image-service
    source_code_url: https://github.com/crvouga/image-service
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: connect-four
    hostname: connectfour.chrisvouga.dev
    github_repo: crvouga/connect-four
    source_code_url: https://github.com/crvouga/connect-four
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: anime-blog
    hostname: anime.chrisvouga.dev
    github_repo: crvouga/anime
    source_code_url: https://github.com/crvouga/anime
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: snake-game
    hostname: snake.chrisvouga.dev
    github_repo: crvouga/snake
    source_code_url: https://github.com/crvouga/snake
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: match-three
    hostname: matchthree.chrisvouga.dev
    github_repo: crvouga/match-three
    source_code_url: https://github.com/crvouga/match-three
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: simon-says
    hostname: simonsays.chrisvouga.dev
    github_repo: crvouga/simon-says
    source_code_url: https://github.com/crvouga/simon-says
    dockerfile: ./Dockerfile
    build_context: .
    port: 80
    health_check: true

  - id: vault
    hostname: vault.chrisvouga.dev
    github_repo: crvouga/vault
    source_code_url: https://github.com/crvouga/vault
    dockerfile: ./Dockerfile
    build_context: .
    port: 8200
    health_check: true
    health_path: /v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200
    env:
      BAO_API_ADDR: "https://vault.chrisvouga.dev"
    secrets:
      - name: DB_CONNECTION_URI
        source: github

  - id: turborepo
    hostname: turborepo.chrisvouga.dev
    github_repo: crvouga/turborepo-remote-cache
    source_code_url: https://github.com/crvouga/turborepo-remote-cache
    dockerfile: apps/api/Dockerfile
    build_context: .
    port: 8080
    health_check: true
    health_path: /health
    env:
      PORT: "8080"
      VAULT_ADDR: "http://vault:8200"
      VAULT_PROJECT: "personal"
      VAULT_CONFIG: "prd"
    depends_on:
      - vault
    secrets:
      - name: VAULT_TOKEN
        source: vault

  - id: normalizer
    hostname: normalizer.chrisvouga.dev
    github_repo: crvouga/normalizer.app
    source_code_url: https://github.com/crvouga/normalizer.app
    dockerfile: infra/server.Dockerfile
    build_context: .
    port: 8080
    health_check: true
    health_path: /health
    env:
      PORT: "8080"
      NODE_ENV: production
      SERVER_BASE_URL: "https://normalizer.chrisvouga.dev"
    secrets:
      - name: DATABASE_URL
        source: vault
      - name: S3_ENDPOINT
        source: vault
      - name: S3_ACCESS_KEY
        source: vault
      - name: S3_SECRET_KEY
        source: vault
      - name: S3_BUCKET
        source: vault
      - name: S3_REGION
        source: vault
      - name: OPENAI_API_KEY
        source: vault
      - name: NORMALIZER_APP_GOOGLE_CLIENT_ID
        source: vault
      - name: NORMALIZER_APP_GOOGLE_CLIENT_SECRET
        source: vault

  - id: llm-proxy
    hostname: llm-proxy.chrisvouga.dev
    github_repo: crvouga/llm-server
    source_code_url: https://github.com/crvouga/llm-server
    dockerfile: proxy/Dockerfile
    build_context: proxy
    port: 8080
    health_check: true
    env:
      PORT: "8080"
    secrets:
      - name: DATABASE_URL
        source: vault

  - id: normalizer-worker
    internal: true
    github_repo: crvouga/normalizer.app
    source_code_url: https://github.com/crvouga/normalizer.app
    dockerfile: infra/worker.Dockerfile
    build_context: .
    health_check: false
    env:
      NODE_ENV: production
    depends_on:
      - normalizer
    secrets:
      - name: DATABASE_URL
        source: vault
      - name: S3_ENDPOINT
        source: vault
      - name: S3_ACCESS_KEY
        source: vault
      - name: S3_SECRET_KEY
        source: vault
      - name: S3_BUCKET
        source: vault
      - name: S3_REGION
        source: vault
      - name: OPENAI_API_KEY
        source: vault

aliases:
  - zone: normalizer.app
    hosts:
      - normalizer.app
      - www.normalizer.app
    target: normalizer.chrisvouga.dev

infra_services:
  - id: netdata
    hostname: netdata.chrisvouga.dev
    image: netdata/netdata:stable
    port: 19999
    health_check: false
    traefik_middlewares:
      - netdata-auth@file
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    secrets:
      - name: NETDATA_USERNAME
        source: vault
      - name: NETDATA_PASSWORD
        source: vault

  - id: dozzle
    hostname: dozzle.chrisvouga.dev
    image: amir20/dozzle:v8
    port: 8080
    health_check: false
    env:
      DOZZLE_HOSTNAME: dozzle.chrisvouga.dev
      DOZZLE_AUTH_PROVIDER: simple
      DOZZLE_NO_ANALYTICS: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dozzle/users.yml:/data/users.yml:ro
    secrets:
      - name: DOZZLE_USERNAME
        source: vault
      - name: DOZZLE_PASSWORD
        source: vault
