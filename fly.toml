app = "crvouga-vault"
primary_region = "iad"

[build]
  image = "ghcr.io/crvouga/chrisvouga-vault:latest"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  BAO_API_ADDR = "https://vault.chrisvouga.dev"

[http_service]
  internal_port = 8200
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "15s"
    method = "GET"
    path = "/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200"
    protocol = "http"
    timeout = "5s"
